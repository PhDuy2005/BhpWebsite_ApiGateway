server:
  port: 8084

spring:
  application:
    name: ApiGateway

  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 110MB

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: management-service
              uri: ${MANAGEMENT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/v1/auth/**,/api/v1/users,/api/v1/users/**,/api/v1/grades,/api/v1/grades/**,/api/v1/lesson-types,/api/v1/lesson-types/**,/api/v1/study-weeks,/api/v1/study-weeks/**,/api/v1/timetable-templates,/api/v1/timetable-templates/**,/api/v1/lessons,/api/v1/lessons/**,/api/v1/period-settings,/api/v1/period-settings/**,/api/v1/periods,/api/v1/periods/**,/api/v1/attendances,/api/v1/attendances/**,/api/v1/record-attendances,/api/v1/record-attendances/**,/api/v1/student/register,/api/v1/manager/student/register,/api/v1/manager/student/register/**,/api/v1/manager/students,/api/v1/online-lectures,/api/v1/online-lectures/**,/api/v1/learning-files,/api/v1/learning-files/**,/api/v1/penalty-tags,/api/v1/penalty-tags/**,/api/v1/penalties,/api/v1/penalties/**,/api/v1/cost-tags,/api/v1/cost-tags/**,/api/v1/costs,/api/v1/costs/**,/api/v1/tham-sos,/api/v1/tham-sos/**,/api/v1/employee-ra-templates,/api/v1/employee-ra-templates/**
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers
            - id: exam-service
              uri: ${EXAM_SERVICE_URI:http://localhost:8080}
              predicates:
                - Path=/api/v1/exams,/api/v1/exams/**,/api/v1/questions,/api/v1/questions/**,/api/v1/question-groups,/api/v1/question-groups/**,/api/v1/student/exams/**,/api/v1/student/attempts,/api/v1/student/attempts/**,/api/v1/omr/**,/api/v1/files,/api/v1/dashboard/**,/api/v1/health
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers
            
            - id: management-service-api-docs
              uri: ${MANAGEMENT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/docs/management-service/v3/api-docs
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers
                - RewritePath=/docs/management-service/(?<segment>.*), /$\{segment}

            - id: exam-service-api-docs
              uri: ${EXAM_SERVICE_URI:http://localhost:8080}
              predicates:
                - Path=/docs/exam-service/v3/api-docs
              filters:
                - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin Access-Control-Expose-Headers
                - RewritePath=/docs/exam-service/(?<segment>.*), /$\{segment}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Management Service
        url: /docs/management-service/v3/api-docs
      - name: Exam Service
        url: /docs/exam-service/v3/api-docs
    urls-primary-name: Management Service

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
